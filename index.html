<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Slope Plus Mobile</title>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            background-color: #000;
            /* Prevents "bounce" scrolling on iOS */
            position: fixed; 
        }
        #gameContainer {
            width: 100vw;
            /* Uses Dynamic Viewport Height to account for mobile browser bars */
            height: 100dvh; 
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/gh/gn-math/assets@51462750d29b68ac1e33887c1bf13d9c478d5ead/198/TemplateData/UnityProgress.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gn-math/assets@51462750d29b68ac1e33887c1bf13d9c478d5ead/198/Build/UnityLoader.js"></script>
    
    <script>
        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                let buffers = [];
                function fetchPart(index) {
                    if (index >= fileParts.length) {
                        let mergedBlob = new Blob(buffers);
                        resolve(URL.createObjectURL(mergedBlob));
                        return;
                    }
                    fetch(fileParts[index]).then(res => res.arrayBuffer()).then(data => {
                        buffers.push(data);
                        fetchPart(index + 1);
                    }).catch(reject);
                }
                fetchPart(0);
            });
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) { parts.push(file + ".part" + i); }
            return parts;
        }

        window.onload = function () {
            const assetsBase = "https://cdn.jsdelivr.net/gh/gn-math/assets@51462750d29b68ac1e33887c1bf13d9c478d5ead/198/Build/";
            
            Promise.all([
                mergeFiles(getParts(assetsBase + "WEB1.2.1.data.unityweb", 1, 2))
            ]).then(([dataUrl]) => {
                let json = {
                    companyName: "Slope Plus",
                    productName: "Slope Plus",
                    dataUrl: dataUrl,
                    wasmCodeUrl: assetsBase + "WEB1.2.1.wasm.code.unityweb",
                    wasmFrameworkUrl: assetsBase + "WEB1.2.1.wasm.framework.unityweb",
                    TOTAL_MEMORY: 268435456,
                    graphicsAPI: ["WebGL 2.0", "WebGL 1.0"],
                    webglContextAttributes: { preserveDrawingBuffer: false },
                    splashScreenStyle: "Dark",
                    backgroundColor: "#000000"
                };
                UnityLoader.instantiate("gameContainer", json, { onProgress: UnityProgress });
            });
        };
    </script>
</head>
<body>
    <div id="gameContainer"></div>
</body>
</html>
